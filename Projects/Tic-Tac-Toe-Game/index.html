<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div class="game-mode-selection">
            <button id="pvp-mode" class="mode-btn active">Play with Friend</button>
            <button id="pve-mode" class="mode-btn">Play vs Bot</button>
        </div>

        <div id="bot-difficulty" class="difficulty-selection hidden">
            <label for="difficulty">Bot Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="game-info">
            <div id="status">Player X's Turn</div>
            <button id="restart-btn">Restart Game</button>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div id="result" class="result hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
